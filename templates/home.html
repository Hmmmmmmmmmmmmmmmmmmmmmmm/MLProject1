<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Exam Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #e2e8f0;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(15, 23, 42, 0.9);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #020617;
            color: #e2e8f0;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn {
            grid-column: span 2;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            color: #22c55e;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Student Exam Predictor</h1>
    <p>Predict Maths Score based on student attributes</p>

    <form id="predictForm" action="{{ url_for('predict_datapoint') }}" method="post">

        <div>
            <label>Gender</label>
            <select name="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div>
            <label>Ethnicity</label>
            <select name="ethnicity" required>
                <option value="" disabled selected>Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div>
            <label>Parental Education</label>
            <select name="parental_level_of_education" required>
                <option value="" disabled selected>Select Education</option>
                <option value="associate's degree">Associate's degree</option>
                <option value="bachelor's degree">Bachelor's degree</option>
                <option value="high school">High school</option>
                <option value="master's degree">Master's degree</option>
                <option value="some college">Some college</option>
                <option value="some high school">Some high school</option>
            </select>
        </div>

        <div>
            <label>Lunch Type</label>
            <select name="lunch" required>
                <option value="" disabled selected>Select Lunch</option>
                <option value="free/reduced">Free/Reduced</option>
                <option value="standard">Standard</option>
            </select>
        </div>

        <div>
            <label>Test Preparation</label>
            <select name="test_preparation_course" required>
                <option value="" disabled selected>Select Course</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div>
            <label>Reading Score</label>
            <input type="number" name="reading_score" min="0" max="100" required>
        </div>

        <div>
            <label>Writing Score</label>
            <input type="number" name="writing_score" min="0" max="100" required>
        </div>

        <button class="btn" type="submit">Predict Maths Score</button>

    </form>

    {% if results is not none %}
        <div class="result">
            Predicted Maths Score: {{ results }}
        </div>
    {% endif %}

</div>

<script>
    // Extra safety check before form submission
    document.getElementById('predictForm').addEventListener('submit', function(e) {
        const dropdowns = [
            this.gender,
            this.ethnicity,
            this.parental_level_of_education,
            this.lunch,
            this.test_preparation_course
        ];

        for (const dropdown of dropdowns) {
            if (!dropdown.value) {
                alert("Please select all dropdown fields before submitting");
                e.preventDefault();
                return;
            }
        }

        const reading = parseFloat(this.reading_score.value);
        const writing = parseFloat(this.writing_score.value);

        if (isNaN(reading) || reading < 0 || reading > 100) {
            alert("Reading score must be between 0 and 100");
            e.preventDefault();
        }

        if (isNaN(writing) || writing < 0 || writing > 100) {
            alert("Writing score must be between 0 and 100");
            e.preventDefault();
        }
    });
</script>
</body>
</html>
